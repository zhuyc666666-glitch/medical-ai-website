<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学 AI 交互平台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>医学 AI 交互平台</h1>
      <p>面向医生与医学生的 AI 辅助学习、交流和知识检索网站。</p>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h2>请选择功能入口</h2>
      <p>当前是第一版主页，后续可以继续扩展 AI 问答、病历辅助、医学工具和知识库等功能。</p>
    </section>

    <section class="entry-grid" aria-label="子页入口">
      <a class="entry-card" href="discussion.html">
        <h3>讨论</h3>
        <p>病例讨论、学习交流、临床经验分享。</p>
      </a>

      <a class="entry-card" href="tools.html">
        <h3>工具</h3>
        <p>医学计算器、病历模板、AI 辅助工具入口。</p>
      </a>

      <a class="entry-card" href="database.html">
        <h3>数据库</h3>
        <p>指南、文献、病例和医学知识资料整理。</p>
      </a>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>本网站内容仅用于医学学习与交流，不替代专业医疗决策。</p>
    </div>
  </footer>
</body>
</html>
